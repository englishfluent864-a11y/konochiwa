name: Render
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_work: ${{ steps.discover.outputs.has_work }}
    steps:
      - name: Install gdown
        run: pip install gdown --break-system-packages
      - name: Discover
        id: discover
        run: |
          python -c "
          import json, os, sys, time
          from pathlib import Path
          import gdown
          IMAGES_FOLDER = '1bbYxw2pNbVS05liS0pObjxevuJ-BdXck'
          TMP_DIR = Path('/tmp/discover_redsky')
          TMP_DIR.mkdir(parents=True, exist_ok=True)
          for attempt in range(3):
              try:
                  gdown.download_folder(id=IMAGES_FOLDER, output=str(TMP_DIR), quiet=False)
                  break
              except Exception as e:
                  print(f'Attempt {attempt+1} failed: {e}')
                  if attempt == 2:
                      sys.exit(1)
                  time.sleep(30)
          MEDIA_EXT = ('.png', '.jpg', '.jpeg', '.mp4', '.mov', '.mkv', '.webm', '.avi')
          all_media = sorted(
              p for p in TMP_DIR.rglob('*')
              if p.suffix.lower() in MEDIA_EXT
          )
          if not all_media:
              sys.exit(1)
          matrix = {'include': [{'media_name': p.name} for p in all_media]}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={json.dumps(matrix)}\n')
              f.write('has_work=true\n')
          "
  render:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker system prune -af || true
          df -h
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages
      - name: Run
        id: render
        env:
          TARGET_MEDIA_NAME: ${{ matrix.media_name }}
        run: python knch.py
      - name: Tag
        id: tag
        run: |
          TS=$(date -u +"%Y%m%d_%H%M%S")
          STEM=$(echo "${{ matrix.media_name }}" | sed 's/\.[^.]*$//')
          echo "tag=r_${STEM}_${TS}" >> $GITHUB_OUTPUT
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.render.outputs.final_size_mb }} MB"
          files: ${{ steps.render.outputs.output_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
