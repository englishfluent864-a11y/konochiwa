name: Render Redsky

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_work: ${{ steps.discover.outputs.has_work }}
    steps:
      - name: Install gdown
        run: pip install gdown --break-system-packages

      - name: Discover images in Drive folder
        id: discover
        run: |
          python -c "
          import json, os, sys, time
          from pathlib import Path
          import gdown

          IMAGES_FOLDER = '1bbYxw2pNbVS05liS0pObjxevuJ-BdXck'
          TMP_DIR = Path('/tmp/discover_redsky')
          TMP_DIR.mkdir(parents=True, exist_ok=True)

          print('Downloading images folder to discover images...')
          for attempt in range(3):
              try:
                  gdown.download_folder(id=IMAGES_FOLDER, output=str(TMP_DIR), quiet=False)
                  break
              except Exception as e:
                  print(f'Attempt {attempt+1} failed: {e}')
                  if attempt == 2:
                      print('ERROR: all retries failed', file=sys.stderr)
                      sys.exit(1)
                  time.sleep(30)

          all_images = sorted(
              p for p in TMP_DIR.rglob('*')
              if p.suffix.lower() in ('.png', '.jpg', '.jpeg')
          )

          if not all_images:
              print('ERROR: no images found in Drive folder.', file=sys.stderr)
              sys.exit(1)

          print(f'Found {len(all_images)} images:')
          for p in all_images:
              print(f'  - {p.name}')

          matrix = {'include': [{'image_name': p.name} for p in all_images]}

          github_output = os.environ.get('GITHUB_OUTPUT')
          with open(github_output, 'a') as f:
              f.write(f'matrix={json.dumps(matrix)}\n')
              f.write(f'has_work=true\n')
          "

  render:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker system prune -af || true
          echo "=== Disk after cleanup ==="
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages
          ffmpeg -version | head -1
          echo "All deps installed."

      - name: Run render
        id: render
        env:
          TARGET_IMAGE_NAME: ${{ matrix.image_name }}
        run: python render.py

      - name: Create release tag
        id: tag
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SAFE_NAME=$(echo "${{ matrix.image_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="video-${TS}-${SAFE_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ matrix.image_name }} — ${{ steps.render.outputs.final_size_mb }} MB"
          body: |
            ## ✅ Rendered Video

            | Field | Value |
            |---|---|
            | **Source image** | `${{ matrix.image_name }}` |
            | **Final size** | ${{ steps.render.outputs.final_size_mb }} MB |
            | **Duration rendered** | ${{ steps.render.outputs.duration_seconds }} seconds |
            | **Workflow run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## ⬇️ Download
            > Click the file under **Assets** below to download your rendered video.
          files: ${{ steps.render.outputs.output_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
